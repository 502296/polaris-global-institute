<!doctype html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover" />
  <title>My Learning — Polaris Global Institute</title>
  <link rel="stylesheet" href="./styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>
  <header class="topbar">
    <div class="wrap topbar__inner">
      <a class="brand" href="./index.html">
        <span class="brand__mark">✦</span>
        <span class="brand__name">Polaris</span>
        <span class="brand__sub">Global Institute</span>
      </a>

      <div class="topbar__actions">
        <a class="btn btn--ghost" href="./index.html">Home</a>
        <button id="btnSignOut" class="btn btn--ghost" type="button">Sign out</button>
      </div>
    </div>
  </header>

  <main class="section">
    <div class="wrap">
      <div class="section__head">
        <h1 class="h2">My Learning</h1>
        <p id="who" class="p muted"></p>
      </div>

      <div id="content" class="cards3">
        <!-- placeholder cards (we’ll load real courses later) -->
        <div class="card">
          <h3 class="h3">Welcome</h3>
          <p class="p muted">Your purchased courses and saved lessons will appear here after payment verification.</p>
        </div>

        <div class="card">
          <h3 class="h3">Next step</h3>
          <p class="p muted">We will connect Stripe to unlock content automatically.</p>
        </div>

        <div class="card">
          <h3 class="h3">Support</h3>
          <p class="p muted">Need help? Contact us any time.</p>
        </div>
      </div>
    </div>
  </main>

  <script src="./supabaseClient.js"></script>
  <script>
    const who = document.getElementById("who");
    const btnSignOut = document.getElementById("btnSignOut");

    (async () => {
      const { data, error } = await supabase.auth.getSession();
      if (error || !data?.session) {
        window.location.href = "./login.html";
        return;
      }
      const user = data.session.user;
      who.textContent = "Signed in as: " + (user.email || user.id);
    })();

    btnSignOut.addEventListener("click", async () => {
      await supabase.auth.signOut();
      window.location.href = "./login.html";
    });
  </script>
</body>
</html>
